name: Auto build blog index and sitemap

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build blog index and sitemap
        run: python scripts/build_blog.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add blog/index.html sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update blog index and sitemap [skip ci]"
            git push
          fi
