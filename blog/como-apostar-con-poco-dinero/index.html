<h1>Cómo apostar con poco dinero</h1>

<p>Si tienes poco dinero, la clave es sobrevivir, no ganar rápido.</p>

<h2>Regla básica</h2>
<p>Apuesta solo el 1% a 3% de tu bankroll.</p>

<h2>Errores comunes</h2>
<ul>
<li>Querer duplicar dinero rápido</li>
<li>Apostar todo en una sola jugada</li>
</ul>

<h2>Consejo clave</h2>
<p>La paciencia es más importante que el capital.</p>
